name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/url-shortener

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # ---------------------------------------------------------------------
  # 1. Lint + unit tests (fast feedback, no infra needed)
  # ---------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        working-directory: app
        run: pip install -r requirements-dev.txt
      - name: Lint
        working-directory: app
        run: ruff check .
      - name: Unit tests
        working-directory: app
        run: pytest -q

  # ---------------------------------------------------------------------
  # 2. Static analysis of IaC + Helm
  # ---------------------------------------------------------------------
  validate-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt + validate
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate
      - uses: azure/setup-helm@v4
      - name: Helm lint
        working-directory: deploy/helm/url-shortener
        run: |
          helm dependency build
          helm lint .

  # ---------------------------------------------------------------------
  # 3. Build image, scan with Trivy, push to GHCR (only on main)
  # ---------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: [test, validate-infra]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: false
          load: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: "0" # report-only; flip to "1" to gate merges

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
