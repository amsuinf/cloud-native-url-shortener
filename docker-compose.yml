# Local development stack: API + Redis. Mirrors the Kubernetes topology so
# "works on compose" closely tracks "works in the cluster".
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./app
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      BASE_URL: http://localhost:8000
      ENVIRONMENT: local
    depends_on:
      redis:
        condition: service_healthy
